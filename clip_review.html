<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EditAI — בחירת קליפים</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141416;
    --surface2: #1c1c20;
    --border: #2a2a30;
    --accent: #e8ff47;
    --accent2: #47ffd4;
    --text: #f0f0f0;
    --muted: #6b6b7a;
    --danger: #ff4747;
    --warn: #ff9f47;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Heebo',sans-serif; min-height:100vh; }

  header {
    border-bottom:1px solid var(--border);
    padding:18px 48px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0;
    background:rgba(13,13,15,0.93);
    backdrop-filter:blur(12px);
    z-index:100;
  }
  .logo { font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:600; color:var(--accent); }
  .logo span { color:var(--muted); font-weight:400; }

  .header-right { display:flex; align-items:center; gap:16px; }

  .user-field { display:flex; align-items:center; gap:8px; }
  .user-field label { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .user-field input {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:6px; padding:5px 10px; color:var(--text);
    font-family:'IBM Plex Mono',monospace; font-size:12px; outline:none;
    width:120px; transition:border-color 0.2s;
  }
  .user-field input:focus { border-color:var(--accent); }

  .status-pill {
    font-family:'IBM Plex Mono',monospace; font-size:11px;
    padding:4px 12px; border-radius:100px;
    border:1px solid var(--border); color:var(--muted);
    display:flex; align-items:center; gap:6px;
  }
  .status-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
  .status-dot.active { background:var(--accent2); box-shadow:0 0 8px var(--accent2); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  main {
    max-width:1200px; margin:0 auto; padding:40px 24px;
    display:grid; grid-template-columns:360px 1fr; gap:32px; align-items:start;
  }

  .panel {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; overflow:hidden;
    position:sticky; top:76px;
  }
  .panel-header {
    padding:16px 22px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-title { font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); }
  .panel-tag { font-family:'IBM Plex Mono',monospace; font-size:10px; padding:2px 8px; border-radius:4px; background:var(--surface2); color:var(--accent); border:1px solid rgba(232,255,71,0.2); }
  .panel-body { padding:22px; display:flex; flex-direction:column; gap:16px; }

  .upload-zone {
    border:1.5px dashed var(--border); border-radius:10px; padding:28px 16px;
    text-align:center; cursor:pointer; transition:all 0.2s;
    position:relative; background:var(--surface2);
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color:var(--accent); background:rgba(232,255,71,0.04); }
  .upload-zone input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .upload-icon { font-size:24px; margin-bottom:8px; display:block; }
  .upload-label { font-size:13px; color:var(--text); font-weight:600; display:block; margin-bottom:3px; }
  .upload-sub { font-size:11px; color:var(--muted); }
  .upload-filename { margin-top:8px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent2); display:none; }

  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:11px; font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
  .field input, .field select {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:7px; padding:9px 12px; color:var(--text);
    font-family:'Heebo',sans-serif; font-size:13px; outline:none;
    transition:border-color 0.2s; width:100%; direction:rtl;
  }
  .field input:focus, .field select:focus { border-color:var(--accent); }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  .prompt-box { border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .prompt-box-header {
    padding:10px 14px; background:var(--surface2); border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .prompt-box-title { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--accent); text-transform:uppercase; letter-spacing:1px; }
  .prompt-reset { font-size:11px; color:var(--muted); cursor:pointer; background:none; border:none; font-family:'IBM Plex Mono',monospace; text-decoration:underline; text-underline-offset:3px; }
  .prompt-reset:hover { color:var(--accent); }
  .prompt-box textarea {
    background:transparent; border:none; padding:12px 14px;
    font-size:11px; direction:ltr; color:#b0b0c4; width:100%;
    resize:vertical; min-height:100px; outline:none;
    font-family:'IBM Plex Mono',monospace; line-height:1.7;
  }

  /* Weights display */
  .weights-box {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:14px;
    display:none;
  }
  .weights-box.visible { display:block; }
  .weights-title { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .weight-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .weight-label { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); width:110px; flex-shrink:0; }
  .weight-bar { flex:1; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
  .weight-fill { height:100%; border-radius:2px; background:var(--accent); transition:width 0.6s ease; }
  .weight-val { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--accent); width:32px; text-align:left; }

  .run-btn {
    width:100%; padding:13px; background:var(--accent); color:#0d0d0f;
    border:none; border-radius:9px; font-family:'Heebo',sans-serif;
    font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .run-btn:hover:not(:disabled) { background:#f4ff80; transform:translateY(-1px); box-shadow:0 8px 24px rgba(232,255,71,0.28); }
  .run-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
  .spinner { width:15px; height:15px; border:2px solid rgba(0,0,0,0.25); border-top-color:#000; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
  .run-btn.loading .spinner { display:block; }
  .run-btn.loading .btn-text { display:none; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .divider { height:1px; background:var(--border); }

  /* RESULTS */
  .results-area { display:flex; flex-direction:column; gap:18px; }
  .results-header { display:flex; align-items:center; justify-content:space-between; }
  .results-title { font-size:22px; font-weight:900; letter-spacing:-0.5px; }
  .results-meta { display:flex; align-items:center; gap:12px; }
  .results-count { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--muted); }

  .feedback-banner {
    background:rgba(71,255,212,0.07); border:1px solid rgba(71,255,212,0.2);
    border-radius:10px; padding:12px 16px;
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--accent2);
    display:none;
  }
  .feedback-banner.visible { display:block; }

  .error-state {
    background:rgba(255,71,71,0.06); border:1px solid rgba(255,71,71,0.2);
    border-radius:10px; padding:16px 20px;
    display:none; gap:10px; align-items:flex-start;
  }
  .error-state.visible { display:flex; }
  .error-text { font-size:12px; color:#ff8080; line-height:1.6; font-family:'IBM Plex Mono',monospace; }

  .empty-state {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:72px 40px; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  .empty-icon { font-size:36px; opacity:0.25; }
  .empty-title { font-size:15px; font-weight:600; color:var(--muted); }
  .empty-sub { font-size:12px; color:var(--muted); opacity:0.55; max-width:280px; line-height:1.6; }

  /* Clip card */
  .clip-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; overflow:hidden;
    animation:fadeUp 0.35s ease forwards; opacity:0;
    transition:border-color 0.2s;
  }
  .clip-card:hover { border-color:rgba(255,255,255,0.12); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .clip-card:nth-child(1){animation-delay:0.05s}
  .clip-card:nth-child(2){animation-delay:0.1s}
  .clip-card:nth-child(3){animation-delay:0.15s}
  .clip-card:nth-child(4){animation-delay:0.2s}
  .clip-card:nth-child(5){animation-delay:0.25s}

  .clip-header {
    padding:16px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .clip-left { display:flex; align-items:center; gap:10px; }
  .clip-num { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); background:var(--surface2); padding:3px 10px; border-radius:100px; border:1px solid var(--border); }
  .hook-badge { font-family:'IBM Plex Mono',monospace; font-size:10px; padding:3px 10px; border-radius:100px; background:rgba(71,255,212,0.1); color:var(--accent2); border:1px solid rgba(71,255,212,0.2); }
  .disq-badge { font-family:'IBM Plex Mono',monospace; font-size:10px; padding:3px 10px; border-radius:100px; background:rgba(255,71,71,0.1); color:var(--danger); border:1px solid rgba(255,71,71,0.2); }

  .final-score { display:flex; align-items:baseline; gap:3px; }
  .final-score-num { font-family:'IBM Plex Mono',monospace; font-size:20px; font-weight:600; }
  .final-score-denom { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); }

  .clip-body { padding:18px 20px; display:flex; flex-direction:column; gap:14px; }

  /* 6 dimension bars */
  .dims-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .dim-row { display:flex; flex-direction:column; gap:4px; }
  .dim-label-row { display:flex; justify-content:space-between; }
  .dim-label { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); }
  .dim-val { font-family:'IBM Plex Mono',monospace; font-size:10px; }
  .dim-bar { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
  .dim-fill { height:100%; border-radius:2px; transition:width 0.7s ease; }

  .clip-reason {
    font-size:12px; color:#9090a8; line-height:1.65;
    padding:10px 14px; background:var(--surface2); border-radius:7px;
    border-right:2px solid var(--accent); direction:ltr; text-align:left;
  }

  .quote-box {
    padding:10px 14px; background:var(--surface2); border-radius:7px;
    border-right:2px solid var(--accent2);
    font-size:13px; color:var(--accent2); font-weight:600;
    direction:rtl; text-align:right;
  }
  .quote-label { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }

  .toggle-row {
    display:flex; align-items:center; gap:8px; cursor:pointer;
    user-select:none; padding:4px 0;
  }
  .toggle-label { font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .toggle-arrow { font-size:9px; color:var(--muted); transition:transform 0.2s; }
  .toggle-arrow.open { transform:rotate(180deg); }
  .clip-text-content {
    display:none; font-size:13px; line-height:1.8; color:#c0c0d0;
    background:var(--surface2); padding:14px; border-radius:7px;
    border:1px solid var(--border); white-space:pre-wrap;
    direction:rtl; text-align:right;
  }
  .clip-text-content.open { display:block; }

  .clip-footer {
    padding:12px 20px; border-top:1px solid var(--border);
    display:flex; align-items:center; gap:10px; background:var(--surface2);
  }
  .feedback-label-sm { font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--muted); margin-left:auto; }

  .fb-btn {
    padding:5px 14px; border-radius:6px; font-size:12px;
    font-family:'Heebo',sans-serif; font-weight:600;
    cursor:pointer; border:1px solid var(--border);
    background:transparent; transition:all 0.15s;
  }
  .fb-btn.good { color:var(--accent2); border-color:rgba(71,255,212,0.3); }
  .fb-btn.good:hover, .fb-btn.good.active { background:rgba(71,255,212,0.12); border-color:var(--accent2); }
  .fb-btn.bad { color:var(--danger); border-color:rgba(255,71,71,0.3); }
  .fb-btn.bad:hover, .fb-btn.bad.active { background:rgba(255,71,71,0.12); border-color:var(--danger); }
  .fb-btn:disabled { opacity:0.4; cursor:default; }

  .fb-comment-wrap { display:none; padding:0 20px 14px; background:var(--surface2); }
  .fb-comment-wrap.open { display:block; }
  .fb-comment { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:7px; padding:8px 12px; color:var(--text); font-family:'Heebo',sans-serif; font-size:12px; outline:none; resize:none; direction:rtl; }
  .fb-comment:focus { border-color:var(--accent); }
  .fb-save-btn {
    margin-top:6px; padding:5px 16px; background:var(--accent); color:#000;
    border:none; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer;
    font-family:'Heebo',sans-serif;
  }
  .fb-saved { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent2); margin-top:4px; display:none; }

  select option { background:#1c1c20; }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  @media(max-width:900px) {
    main { grid-template-columns:1fr; }
    .panel { position:static; }
    header { padding:14px 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Edit<span>AI</span></div>
  <div class="header-right">
    <div class="user-field">
      <label>משתמש</label>
      <input type="text" id="userId" value="default" placeholder="user_id">
    </div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">מוכן</span>
    </div>
  </div>
</header>

<main>
  <!-- LEFT PANEL -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">הגדרות</span>
      <span class="panel-tag">6-dim scoring</span>
    </div>
    <div class="panel-body">

      <div class="field">
        <label>קובץ תמלול (.txt)</label>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept=".txt">
          <span class="upload-icon">📄</span>
          <span class="upload-label">גרור קובץ לכאן</span>
          <span class="upload-sub">או לחץ לבחירה</span>
          <span class="upload-filename" id="uploadFilename"></span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="field">
        <label>טון</label>
        <input type="text" id="tone" value="educational">
      </div>
      <div class="field">
        <label>קהל יעד</label>
        <input type="text" id="audience" value="women, beauty">
      </div>
      <div class="field">
        <label>פלטפורמה</label>
        <input type="text" id="platform" value="tiktok, instagram">
      </div>
      <div class="field-row">
        <div class="field"><label>מינ׳ שניות</label><input type="number" id="minSec" value="30"></div>
        <div class="field"><label>מקס׳ שניות</label><input type="number" id="maxSec" value="200"></div>
      </div>

      <div class="divider"></div>

      <!-- Learned weights display -->
      <div class="weights-box" id="weightsBox">
        <div class="weights-title">משקלים נלמדים ממשוב</div>
        <div id="weightRows"></div>
      </div>

      <!-- Custom prompt override -->
      <div class="field">
        <label>פרומפט מותאם אישית (אופציונלי)</label>
        <div class="prompt-box">
          <div class="prompt-box-header">
            <span class="prompt-box-title">override system prompt</span>
            <button class="prompt-reset" onclick="document.getElementById('customPrompt').value=''">נקה</button>
          </div>
          <textarea id="customPrompt" placeholder="השאר ריק להשתמש בפרומפט הברירת מחדל עם 6 מימדים..."></textarea>
        </div>
      </div>

      <button class="run-btn" id="runBtn" onclick="runAnalysis()">
        <div class="spinner"></div>
        <span class="btn-text">▶ הפעל ניתוח</span>
      </button>

    </div>
  </div>

  <!-- RIGHT: Results -->
  <div class="results-area">
    <div class="results-header">
      <h2 class="results-title">קליפים נבחרים</h2>
      <div class="results-meta">
        <span class="results-count" id="resultsCount"></span>
      </div>
    </div>

    <div class="feedback-banner" id="feedbackBanner"></div>
    <div class="error-state" id="errorState">
      <span>⚠</span>
      <span class="error-text" id="errorText"></span>
    </div>

    <div id="resultsContainer">
      <div class="empty-state">
        <span class="empty-icon">🎬</span>
        <span class="empty-title">אין תוצאות עדיין</span>
        <span class="empty-sub">העלה קובץ תמלול, הגדר את הפרופיל ולחץ הפעל</span>
      </div>
    </div>
  </div>
</main>

<script>
const API = 'http://127.0.0.1:8000';
let transcriptContent = null;

const DIM_LABELS = {
  hook_strength:  'Hook',
  completeness:   'Complete',
  emotional_peak: 'Emotion',
  value_density:  'Value',
  profile_match:  'Profile',
  quotability:    'Quotable'
};

const DIM_COLORS = {
  hook_strength:  '#e8ff47',
  completeness:   '#47ffd4',
  emotional_peak: '#ff9f47',
  value_density:  '#a78bfa',
  profile_match:  '#60a5fa',
  quotability:    '#f472b6'
};

// ── File upload ──────────────────────────────
const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    transcriptContent = e.target.result;
    const el = document.getElementById('uploadFilename');
    el.textContent = '✓ ' + file.name;
    el.style.display = 'block';
  };
  reader.readAsText(file, 'utf-8');
}

// ── Status ───────────────────────────────────
function setStatus(text, active) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').className = 'status-dot' + (active ? ' active' : '');
}

function showError(msg) {
  const el = document.getElementById('errorState');
  document.getElementById('errorText').textContent = msg;
  el.classList.add('visible');
}
function hideError() { document.getElementById('errorState').classList.remove('visible'); }

function showBanner(msg) {
  const el = document.getElementById('feedbackBanner');
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 4000);
}

// ── Load weights for current user ────────────
async function loadWeights() {
  const userId = document.getElementById('userId').value || 'default';
  try {
    const res = await fetch(`${API}/feedback/stats/${userId}`);
    if (!res.ok) return;
    const data = await res.json();
    renderWeights(data.weights, data.stats);
  } catch {}
}

document.getElementById('userId').addEventListener('blur', loadWeights);

function renderWeights(weights, stats) {
  const box = document.getElementById('weightsBox');
  const rows = document.getElementById('weightRows');
  if (!weights || stats?.total < 1) { box.classList.remove('visible'); return; }
  box.classList.add('visible');
  rows.innerHTML = '';
  if (stats) {
    const info = document.createElement('div');
    info.style.cssText = 'font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--muted);margin-bottom:10px;';
    info.textContent = `${stats.total} פידבקים | ${stats.good} ✅ ${stats.bad} ❌`;
    rows.appendChild(info);
  }
  Object.entries(weights).forEach(([k, v]) => {
    const pct = Math.round(v * 100);
    const row = document.createElement('div');
    row.className = 'weight-row';
    row.innerHTML = `
      <span class="weight-label">${DIM_LABELS[k] || k}</span>
      <div class="weight-bar"><div class="weight-fill" style="width:${pct*4}%;background:${DIM_COLORS[k]||'var(--accent)'}"></div></div>
      <span class="weight-val">${pct}%</span>
    `;
    rows.appendChild(row);
  });
}

// ── Run analysis ─────────────────────────────
async function runAnalysis() {
  if (!transcriptContent) { showError('לא הועלה קובץ תמלול'); return; }
  hideError();
  const btn = document.getElementById('runBtn');
  btn.disabled = true; btn.classList.add('loading');
  setStatus('מנתח...', true);

  const payload = {
    transcript: transcriptContent,
    strategy: {
      tone: document.getElementById('tone').value,
      audience: document.getElementById('audience').value,
      platform: document.getElementById('platform').value,
      min_clip_seconds: parseInt(document.getElementById('minSec').value),
      max_clip_seconds: parseInt(document.getElementById('maxSec').value),
      require_hook: true,
      custom_prompt: document.getElementById('customPrompt').value || null,
      user_id: document.getElementById('userId').value || 'default'
    }
  };

  try {
    const res = await fetch(`${API}/select-clips`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(`שגיאת שרת ${res.status}`);
    const data = await res.json();
    renderClips(data.clips);
    setStatus('הושלם', false);
    await loadWeights();
  } catch (err) {
    showError('שגיאה: ' + err.message + '\nוודא שהשרת רץ על localhost:8000');
    setStatus('שגיאה', false);
  } finally {
    btn.disabled = false; btn.classList.remove('loading');
  }
}

// ── Render clips ─────────────────────────────
function scoreColor(s) {
  if (s >= 8) return '#e8ff47';
  if (s >= 6) return '#47ffd4';
  if (s >= 4) return '#ff9f47';
  return '#ff4747';
}

function renderClips(clips) {
  const container = document.getElementById('resultsContainer');
  const count = document.getElementById('resultsCount');

  if (!clips || clips.length === 0) {
    container.innerHTML = `<div class="empty-state"><span class="empty-icon">🔍</span><span class="empty-title">לא נמצאו קליפים מתאימים</span><span class="empty-sub">נסה לשנות את הפרמטרים או הפרומפט</span></div>`;
    count.textContent = ''; return;
  }

  count.textContent = `${clips.length} קליפים`;
  container.innerHTML = '';

  clips.forEach((clip, i) => {
    const fs = clip.final_score || clip.score || 0;
    const scores = clip.scores || {};
    const card = document.createElement('div');
    card.className = 'clip-card';

    // Build dimension bars
    const dimBars = Object.entries(DIM_LABELS).map(([k, label]) => {
      const val = scores[k] ?? 0;
      const color = DIM_COLORS[k];
      return `<div class="dim-row">
        <div class="dim-label-row">
          <span class="dim-label">${label}</span>
          <span class="dim-val" style="color:${color}">${val}/10</span>
        </div>
        <div class="dim-bar"><div class="dim-fill" style="width:${val*10}%;background:${color}"></div></div>
      </div>`;
    }).join('');

    const quoteHtml = clip.best_quote
      ? `<div class="quote-box"><div class="quote-label">ציטוט מומלץ</div>${clip.best_quote}</div>`
      : '';

    card.innerHTML = `
      <div class="clip-header">
        <div class="clip-left">
          <span class="clip-num">קליפ ${i+1}</span>
          ${scores.hook_strength >= 6 ? '<span class="hook-badge">✦ HOOK</span>' : ''}
        </div>
        <div class="final-score">
          <span class="final-score-num" style="color:${scoreColor(fs)}">${fs.toFixed ? fs.toFixed(1) : fs}</span>
          <span class="final-score-denom">/10</span>
        </div>
      </div>
      <div class="clip-body">
        <div class="dims-grid">${dimBars}</div>
        ${clip.reason ? `<div class="clip-reason">${clip.reason}</div>` : ''}
        ${quoteHtml}
        <div class="toggle-row" onclick="toggleText(this)">
          <span class="toggle-label">טקסט מלא</span>
          <span class="toggle-arrow">▼</span>
        </div>
        <div class="clip-text-content">${clip.text || ''}</div>
      </div>
      <div class="clip-footer">
        <span class="feedback-label-sm">דירוג:</span>
        <button class="fb-btn good" onclick="openFeedback(this,'good',${i})">👍 טוב</button>
        <button class="fb-btn bad"  onclick="openFeedback(this,'bad',${i})">👎 לא מתאים</button>
      </div>
      <div class="fb-comment-wrap" id="fb-wrap-${i}">
        <textarea class="fb-comment" rows="2" placeholder="הערה (אופציונלי) — מה היה חסר? מה היה מיותר?"></textarea>
        <button class="fb-save-btn" onclick="saveFeedback(${i})">שמור משוב</button>
        <div class="fb-saved" id="fb-saved-${i}">✓ נשמר</div>
      </div>
    `;

    // Store clip data on card for feedback
    card.dataset.clipIndex = i;
    card.dataset.clipText = (clip.text || '').substring(0, 600);
    card.dataset.scores = JSON.stringify(scores);
    container.appendChild(card);
  });
}

function toggleText(el) {
  const arrow = el.querySelector('.toggle-arrow');
  const content = el.nextElementSibling;
  const open = content.classList.toggle('open');
  arrow.classList.toggle('open', open);
}

function openFeedback(btn, verdict, idx) {
  const card = document.querySelector(`[data-clip-index="${idx}"]`);
  const footer = btn.closest('.clip-footer');
  const wrap = document.getElementById(`fb-wrap-${idx}`);

  footer.querySelectorAll('.fb-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  card.dataset.verdict = verdict;
  wrap.classList.add('open');
}

async function saveFeedback(idx) {
  const card = document.querySelector(`[data-clip-index="${idx}"]`);
  const wrap = document.getElementById(`fb-wrap-${idx}`);
  const savedEl = document.getElementById(`fb-saved-${idx}`);
  const comment = wrap.querySelector('.fb-comment').value;
  const userId = document.getElementById('userId').value || 'default';

  const payload = {
    user_id: userId,
    clip_text: card.dataset.clipText,
    scores: JSON.parse(card.dataset.scores || '{}'),
    verdict: card.dataset.verdict || 'bad',
    comment: comment
  };

  try {
    const res = await fetch(`${API}/feedback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    savedEl.style.display = 'block';
    renderWeights(data.current_weights, data.stats);
    showBanner(`✓ משוב נשמר | סה״כ ${data.stats.total} פידבקים | המשקלים עודכנו`);
  } catch (err) {
    showError('שגיאה בשמירת משוב: ' + err.message);
  }
}

// Load weights on start
loadWeights();
</script>
